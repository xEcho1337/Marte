{{template "layout" .}}

{{define "content"}}
<div class="container-fluid px-0 py-3">
    <div class="mb-4">
        <p class="text-primary text-uppercase fw-semibold small mb-2">Top Attaccanti</p>
        <h1 class="display-6 fw-semibold mb-2">Leaderboard</h1>
        <p class="lead text-secondary mb-0">
            Attackers with the most accepted flags.
        </p>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                    <tr>
                        <th style="width: 60px">#</th>
                        <th>Attacker</th>
                        <th class="text-end">Flags Accepted</th>
                        <th class="text-end">Total Flags</th>
                    </tr>
                    </thead>
                    <tbody id="topTable">
                    <tr><td colspan="4" class="text-secondary">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    function rankBadge(rank) {
        if (rank === 1) return '<span class="text-warning">1</span>';
        if (rank === 2) return '<span class="text-secondary">2</span>';
        if (rank === 3) return '<span class="text-danger">3</span>';
        return rank;
    }

    function medalIcon(rank) {
        if (rank === 1) return '<i class="bi bi-trophy-fill text-warning fs-5"></i>';
        if (rank === 2) return '<i class="bi bi-trophy-fill text-secondary fs-5"></i>';
        if (rank === 3) return '<i class="bi bi-trophy-fill text-danger fs-5"></i>';
        return '';
    }

    async function loadTop() {
        const res = await App.api('/api/top');
        if (!res || !res.ok) return;
        const data = await res.json();

        const tbody = document.getElementById('topTable');
        if (!data.attackers || data.attackers.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-secondary">No data</td></tr>';
            return;
        }

        tbody.innerHTML = data.attackers.map((a, i) => {
            const rank = i + 1;
            const medal = medalIcon(rank);
            return `<tr>
                <td>
                    <span class="fw-bold">${medal} ${rankBadge(rank)}</span>
                </td>
                <td>
                    <span class="fw-semibold">${a.username}</span>
                </td>
                <td class="text-end">
                    <span class="badge bg-success fs-6">${a.accepted}</span>
                </td>
                <td class="text-end text-muted">${a.total}</td>
            </tr>`;
        }).join('');
    }

    loadTop();
</script>
{{end}}
