name: Build

on:
  push:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/xecho1337/marte

jobs:
  client:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        arch: [amd64, arm64]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: |
          GOOS=${{ matrix.os == 'ubuntu-latest' && 'linux' || 'darwin' }} GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w" -o marte ./client
      - uses: actions/upload-artifact@v4
        with:
          name: marte-client-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'darwin' }}-${{ matrix.arch }}
          path: marte

  backend:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: GOOS=linux GOARCH=${{ matrix.arch }} go build -ldflags="-s -w" -o marte ./backend
      - uses: actions/upload-artifact@v4
        with:
          name: marte-backend-linux-${{ matrix.arch }}
          path: marte

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [client, backend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Rename binaries to unique names
        run: |
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            mv "$dir/marte" "artifacts/${name}.bin"
            rmdir "$dir"
          done
          for f in artifacts/*.bin; do
            mv "$f" "${f%.bin}"
          done
      - name: Set release name
        id: release_name
        run: |
          sha="${{ github.sha }}"
          echo "name=Build (${sha:0:8})" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: continuous
          name: ${{ steps.release_name.outputs.name }}
          body: |
            Automatic release from commit ${{ github.sha }}.
          artifacts: "artifacts/*"
          artifactErrorsFailBuild: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true

  docker:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend]
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: marte-backend-linux-${{ matrix.arch }}
          path: .
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ env.IMAGE }}:${{ matrix.arch }}

  manifest:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [docker]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Create and push manifest
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:amd64 \
            ${{ env.IMAGE }}:arm64
