name: Build

on:
  push:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  client:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        arch: [amd64, arm64]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: |
          GOOS=${{ matrix.os == 'ubuntu-latest' && 'linux' || 'darwin' }} GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w" -o client/out/marte ./client
      - uses: actions/upload-artifact@v4
        with:
          name: marte-client-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'darwin' }}-${{ matrix.arch }}
          path: client/out/marte

  backend:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: |
          GOOS=linux GOARCH=${{ matrix.arch }} go build -ldflags="-s -w" -o backend/out/marte ./backend
      - uses: actions/upload-artifact@v4
        with:
          name: marte-backend-linux-${{ matrix.arch }}
          path: backend/out/marte

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [client, backend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Rename binaries to unique names
        run: |
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            mv "$dir/marte" "artifacts/${name}.bin"
            rmdir "$dir"
          done
          for f in artifacts/*.bin; do
            mv "$f" "${f%.bin}"
          done
          ls -la artifacts/
      - name: Set release name
        id: release_name
        run: |
          sha="${{ github.sha }}"
          echo "name=Build (${sha:0:8})" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: continuous
          name: ${{ steps.release_name.outputs.name }}
          body: |
            Automatic release from commit ${{ github.sha }}.

            | Artifact | Description |
            |----------|-------------|
            | marte-client-linux-amd64 | Linux amd64 client |
            | marte-client-linux-arm64 | Linux arm64 client |
            | marte-client-darwin-amd64 | macOS amd64 client |
            | marte-client-darwin-arm64 | macOS arm64 client |
            | marte-backend-linux-amd64 | Linux amd64 backend |
            | marte-backend-linux-arm64 | Linux arm64 backend |
          artifacts: "artifacts/*"
          artifactErrorsFailBuild: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true

  docker:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase repo
        id: repo
        run: echo "value=ghcr.io/$(echo $GITHUB_REPOSITORY | tr '[:upper:]' '[:lower:]'):latest" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.repo.outputs.value }}
