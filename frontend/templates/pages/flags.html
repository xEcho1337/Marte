{{template "layout" .}}

{{define "content"}}
<div class="container-fluid px-0 py-3">
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <p class="text-primary text-uppercase fw-semibold small mb-2">Flags</p>
            <h1 class="display-6 fw-semibold mb-2">Flag Management</h1>
            <p class="lead text-secondary mb-0">
                Submitted flags and their acceptance status.
            </p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary" onclick="downloadAllFlags()">
                <i class="bi bi-download"></i> Download all
            </button>
            <button class="btn btn-outline-primary" onclick="loadFlags()">
                <i class="bi bi-arrow-clockwise"></i> Refresh
            </button>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-12 col-md-3">
            <div class="card h-100 shadow-sm">
                <div class="card-body p-4">
                    <h2 class="h5 mb-2">Total</h2>
                    <p class="display-6 fw-bold text-primary mb-0" id="flagTotal">-</p>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-3">
            <div class="card h-100 shadow-sm">
                <div class="card-body p-4">
                    <h2 class="h5 mb-2">Accepted</h2>
                    <p class="display-6 fw-bold text-success mb-0" id="flagAccepted">-</p>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-3">
            <div class="card h-100 shadow-sm">
                <div class="card-body p-4">
                    <h2 class="h5 mb-2">Rejected</h2>
                    <p class="display-6 fw-bold text-danger mb-0" id="flagRejected">-</p>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-3">
            <div class="card h-100 shadow-sm">
                <div class="card-body p-4">
                    <h2 class="h5 mb-2">Pending</h2>
                    <p class="display-6 fw-bold text-warning mb-0" id="flagPending">-</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="d-flex align-items-center gap-2">
                    <label class="form-label mb-0 text-nowrap">Per page:</label>
                    <select class="form-select form-select-sm w-auto" id="pageSize" onchange="changePageSize()">
                        <option value="50">50</option>
                        <option value="100" selected>100</option>
                        <option value="200">200</option>
                        <option value="500">500</option>
                        <option value="0">All</option>
                    </select>
                </div>
                <div class="d-flex align-items-center gap-2" id="pagination">
                </div>
            </div>
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Flag</th>
                        <th>Team</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody id="flagsTable">
                    <tr><td colspan="4" class="text-secondary">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let currentPage = 1;
    let cachedTotal = 0;

    function getPageSize() {
        return parseInt(document.getElementById('pageSize').value);
    }

    function getOffset() {
        return (currentPage - 1) * getPageSize();
    }

    function statusBadge(status) {
        switch (status) {
            case 'accepted': return 'bg-success';
            case 'pending':  return 'bg-warning text-dark';
            default:         return 'bg-danger';
        }
    }

    async function loadFlags() {
        const limit = getPageSize();
        const offset = getOffset();
        const data = await App.getFlags(limit, offset);
        if (!data || !data.flags) return;

        const flags = data.flags;
        cachedTotal = data.total || flags.length;

        if (data.summary) {
            document.getElementById('flagTotal').textContent = data.summary.total;
            document.getElementById('flagAccepted').textContent = data.summary.accepted;
            document.getElementById('flagRejected').textContent = data.summary.rejected;
            document.getElementById('flagPending').textContent = data.summary.pending;
        } else {
            document.getElementById('flagTotal').textContent = cachedTotal;
            document.getElementById('flagAccepted').textContent = flags.filter(f => f.status === 'accepted').length;
            document.getElementById('flagRejected').textContent = flags.filter(f => f.status === 'duplicate' || f.status === 'too_old').length;
            document.getElementById('flagPending').textContent = flags.filter(f => f.status === 'pending').length;
        }

        const tbody = document.getElementById('flagsTable');
        if (flags.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-secondary">No flags found</td></tr>';
        } else {
            const startIdx = offset + 1;
            tbody.innerHTML = flags.map((f, i) => {
                const badge = statusBadge(f.status);
                return `<tr>
                    <td class="text-muted small">${startIdx + i}</td>
                    <td><code>${f.value}</code></td>
                    <td>${f.team_id}</td>
                    <td><span class="badge ${badge}">${f.status}</span></td>
                </tr>`;
            }).join('');
        }

        renderPagination();
    }

    function renderPagination() {
        if (getPageSize() === 0 || cachedTotal === 0) {
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        const totalPages = Math.ceil(cachedTotal / getPageSize());
        let html = `<span class="text-muted small">Page ${currentPage} of ${totalPages}</span>`;
        html += `<button class="btn btn-sm btn-outline-secondary" onclick="goPage(1)" ${currentPage <= 1 ? 'disabled' : ''}><i class="bi bi-chevron-double-left"></i></button>`;
        html += `<button class="btn btn-sm btn-outline-secondary" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}><i class="bi bi-chevron-left"></i></button>`;
        html += `<button class="btn btn-sm btn-outline-secondary" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}><i class="bi bi-chevron-right"></i></button>`;
        html += `<button class="btn btn-sm btn-outline-secondary" onclick="goPage(${totalPages})" ${currentPage >= totalPages ? 'disabled' : ''}><i class="bi bi-chevron-double-right"></i></button>`;
        document.getElementById('pagination').innerHTML = html;
    }

    function goPage(page) {
        if (getPageSize() === 0) return;
        const totalPages = Math.ceil(cachedTotal / getPageSize());
        if (page < 1) page = 1;
        if (page > totalPages) page = totalPages;
        currentPage = page;
        loadFlags();
    }

    function changePageSize() {
        currentPage = 1;
        loadFlags();
    }

    async function downloadAllFlags() {
        const btn = event.target.closest('button');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Downloading...';

        try {
            const data = await App.getFlags(0, 0);
            if (!data || !data.flags) {
                alert('Error downloading flags');
                return;
            }

            let csv = 'value,status,team_id,timestamp\n';
            for (const f of data.flags) {
                csv += `"${f.value}",${f.status},${f.team_id},${f.timestamp}\n`;
            }

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `flags_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-download"></i> Download all';
        }
    }

    loadFlags();
</script>
{{end}}
